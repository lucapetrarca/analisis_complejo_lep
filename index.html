<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CauchyLingo - Análisis Complejo</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --bg-color: #ffffff;
            --text-color: #3c3c3c;
            --gray-light: #e5e5e5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: var(--bg-color);
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            height: 15px;
            background-color: var(--gray-light);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            min-height: 80px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background-color: white;
            border: 2px solid var(--gray-light);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover {
            background-color: #f0f0f0;
        }
        .option-btn.correct {
            background-color: #d7ffb8;
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        .option-btn.incorrect {
            background-color: #ffdfe0;
            border-color: #ea2b2b;
            color: #ea2b2b;
        }
        .feedback {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }
        .next-btn {
            margin-top: 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            display: none;
            width: 100%;
            border-bottom: 4px solid var(--primary-dark);
        }
        .next-btn:active {
            transform: translateY(2px);
            border-bottom: 2px solid var(--primary-dark);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
    
    <div id="lesson-content">
        <div class="question-text" id="question">Cargando lección...</div>
        <div class="options-container" id="options"></div>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextLesson()">CONTINUAR</button>
</div>

<script>
    // Nuestra "Base de datos" de lecciones. Empezamos con Holomorfía y Cauchy-Riemann (Tema del Parcial 1)
    const lessons = [
        {
            type: 'info',
            text: '<b>Módulo: Cauchy-Riemann Nivel Parcial.</b><br>Ya sabemos que si \\( f(z) = u + iv \\) es holomorfa, entonces \\( u_x = v_y \\) y \\( u_y = -v_x \\). Pero en la FCEyN esto se usa para cosas más profundas. ¡Vamos a deducir!',
            options: ['Arrancar'],
            correct: 0,
            feedback: 'Asegurate de tener papel y lápiz a mano para estos.'
        },
        {
            type: 'quiz',
            text: '<b>Armónicas Conjugadas:</b> Sea \\( u(x,y) = x^3 - 3xy^2 \\). Sabemos que es la parte real de una función entera \\( f(z) = u + iv \\). Usando Cauchy-Riemann, ¿cuál de las siguientes es su armónica conjugada \\( v(x,y) \\)?',
            options: [
                '\\( v(x,y) = -3x^2y + y^3 + C \\)',
                '\\( v(x,y) = 3x^2y - y^3 + C \\)',
                '\\( v(x,y) = 3x^2y + y^3 + C \\)'
            ],
            correct: 1,
            feedback: '¡Exacto! Como \\( u_x = 3x^2 - 3y^2 = v_y \\), integrando respecto a \\( y \\) da \\( v = 3x^2y - y^3 + h(x) \\). Usando la otra ecuación de C-R se deduce que \\( h\'(x) = 0 \\).'
        },
        {
            type: 'quiz',
            text: '<b>Geometría (Ideal para Data Science):</b> Si escribimos los gradientes como \\( \\nabla u = (u_x, u_y) \\) y \\( \\nabla v = (v_x, v_y) \\). Si \\( f=u+iv \\) es holomorfa y \\( f\'(z) \\neq 0 \\), ¿qué relación geométrica tienen las curvas de nivel de \\( u \\) y \\( v \\)?',
            options: [
                'Son siempre paralelas (el producto cruz es cero).',
                'El ángulo entre ellas depende de \\( z \\).',
                'Son ortogonales (su producto interno \\( \\nabla u \\cdot \\nabla v = 0 \\)).'
            ],
            correct: 2,
            feedback: '¡Bien! \\( \\nabla u \\cdot \\nabla v = u_x v_x + u_y v_y = u_x(-u_y) + u_y(u_x) = 0 \\). Esto significa que las redes de partes reales e imaginarias forman grillas ortogonales.'
        },
        {
            type: 'info',
            text: '<br>Visualmente, si mapeas las curvas donde \\( u=cte \\) y \\( v=cte \\), siempre se cruzan a 90 grados. Esta propiedad preservadora de ángulos se llama <b>Mapeo Conforme</b> y es brutal para transformar dominios en Machine Learning geométrico.',
            options: ['Entendido, vamos al ejercicio del parcial'],
            correct: 0,
            feedback: 'Preparate para aplicar regla de la cadena.'
        },
        {
            type: 'quiz',
            text: '<b>El Ejercicio 1 de tu Parcial:</b> Tienes \\( f=u+iv \\) holomorfa y \\( \\varphi(u,v) = k \\) (curva de nivel). Te piden probar que \\( f \\) es constante. Al derivar \\( \\varphi(u(x,y), v(x,y)) = k \\) respecto a \\( x \\) e \\( y \\), obtienes: <br> 1) \\( \\varphi_u u_x + \\varphi_v v_x = 0 \\)<br> 2) \\( \\varphi_u u_y + \\varphi_v v_y = 0 \\)<br>¿Cuál es el siguiente paso lógico usando Cauchy-Riemann?',
            options: [
                'Integrar ambas ecuaciones respecto a \\( x \\) e \\( y \\).',
                'Reemplazar \\( v_x, v_y \\) por \\( u_x, u_y \\) para armar un sistema homogéneo donde las incógnitas son \\( \\varphi_u, \\varphi_v \\).',
                'Aplicar el Teorema de Liouville porque la curva está acotada.'
            ],
            correct: 1,
            feedback: '¡Clave! Al reemplazar te queda un sistema matricial de 2x2. ¡Vamos a verlo en el siguiente paso!'
        },
        {
            type: 'quiz',
            text: '<b>Resolviendo el Parcial (Final):</b> El sistema matricial te queda con matriz de coeficientes \\( A = \\begin{pmatrix} u_x & -u_y \\\\ u_y & u_x \\end{pmatrix} \\) multiplicada por el vector \\( (\\varphi_u, \\varphi_v)^T = (0,0)^T \\). El enunciado dice que \\( \\nabla \\varphi \\neq \\vec{0} \\). ¿Qué implica esto sobre el determinante de \\( A \\)?',
            options: [
                'Que el determinante debe ser nulo, es decir \\( (u_x)^2 + (u_y)^2 = 0 \\).',
                'Que el determinante debe ser distinto de cero.',
                'Que la traza de la matriz es cero.'
            ],
            correct: 0,
            feedback: '¡Bingo, resolviste el parcial! Si el gradiente de \\( \\varphi \\) no es nulo, el sistema homogéneo tiene solución no trivial. Por Álgebra Lineal (¡que la tenés clarísima!), el determinante de \\( A \\) debe ser 0. Como \\( det(A) = |f\'(z)|^2 \\), entonces \\( f\'(z) = 0 \\) en todo el dominio. Ergo, \\( f \\) es constante. ∎'
        }
    ];

    let currentLesson = 0;

    function renderLesson() {
        const lesson = lessons[currentLesson];
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const feedbackEl = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');

        // Actualizar UI
        questionEl.innerHTML = lesson.text;
        optionsEl.innerHTML = '';
        feedbackEl.innerHTML = '';
        nextBtn.style.display = 'none';

        // Barra de progreso
        const progress = (currentLesson / lessons.length) * 100;
        document.getElementById('progress').style.width = progress + '%';

        // Generar botones
        lesson.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsEl.appendChild(btn);
        });

        // Re-renderizar las matemáticas de LaTeX
        MathJax.typesetPromise();
    }

    function checkAnswer(selectedIndex, btnElement) {
        const lesson = lessons[currentLesson];
        const feedbackEl = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const allBtns = document.querySelectorAll('.option-btn');

        // Deshabilitar botones después de responder
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex === lesson.correct) {
            btnElement.classList.add('correct');
            feedbackEl.innerHTML = '✅ ' + lesson.feedback;
            feedbackEl.style.color = 'var(--primary-dark)';
            nextBtn.style.display = 'block';
        } else {
            btnElement.classList.add('incorrect');
            feedbackEl.innerHTML = '❌ Inténtalo de nuevo.';
            feedbackEl.style.color = '#ea2b2b';
            // Permitir volver a intentar después de un segundo
            setTimeout(() => {
                btnElement.classList.remove('incorrect');
                feedbackEl.innerHTML = '';
                allBtns.forEach(b => b.disabled = false);
            }, 1500);
        }
        MathJax.typesetPromise();
    }

    function nextLesson() {
        currentLesson++;
        if (currentLesson < lessons.length) {
            renderLesson();
        } else {
            document.getElementById('lesson-content').innerHTML = '<h2>¡Módulo completado! 🎉</h2><p>Ya dominas lo básico de Cauchy-Riemann.</p>';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('progress').style.width = '100%';
        }
    }

    // Iniciar app
    window.onload = renderLesson;
</script>

</body>
</html>
