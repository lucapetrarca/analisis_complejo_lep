<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CauchyLingo - Análisis Complejo</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --bg-color: #ffffff;
            --text-color: #3c3c3c;
            --gray-light: #e5e5e5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f7f7;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: var(--bg-color);
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            height: 15px;
            background-color: var(--gray-light);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            min-height: 80px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background-color: white;
            border: 2px solid var(--gray-light);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .option-btn:hover {
            background-color: #f0f0f0;
        }
        .option-btn.correct {
            background-color: #d7ffb8;
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        .option-btn.incorrect {
            background-color: #ffdfe0;
            border-color: #ea2b2b;
            color: #ea2b2b;
        }
        .feedback {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }
        .next-btn {
            margin-top: 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            display: none;
            width: 100%;
            border-bottom: 4px solid var(--primary-dark);
        }
        .next-btn:active {
            transform: translateY(2px);
            border-bottom: 2px solid var(--primary-dark);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
    
    <div id="lesson-content">
        <div class="question-text" id="question">Cargando lección...</div>
        <div class="options-container" id="options"></div>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextLesson()">CONTINUAR</button>
</div>

<script>
    // Nuestra "Base de datos" de lecciones. Empezamos con Holomorfía y Cauchy-Riemann (Tema del Parcial 1)
    const lessons = [
        {
            type: 'info',
            text: '<b>Módulo 2: Teorema de los Residuos.</b><br>El teorema dice que si tienes una curva cerrada simple \\( \\gamma \\), la integral de una función holomorfa sobre ella es \\( 2\\pi i \\) por la suma de los "residuos" de las singularidades que quedaron atrapadas adentro.',
            options: ['¡A integrar!'],
            correct: 0,
            feedback: 'El residuo es simplemente el coeficiente \\( a_{-1} \\) del desarrollo de Laurent alrededor de la singularidad.'
        },
        {
            type: 'info',
            text: '<b>CONSIGNA DEL SEGUNDO PARCIAL (26/11/2025) - Ejercicio 1:</b><br><br>Sea \\( \\alpha > 0 \\). Calcular la integral impropia:<br><br> \\( \\displaystyle \\int_0^\\infty \\frac{\\operatorname{sen}(x)}{x(x^2 + \\alpha^2)} dx \\)<br><br><i>Sugerencia: Puede ser útil considerar el contorno dado por medio anillo \\( A(0, r, R) \\) en el semiplano superior (incluyendo los bordes) con \\( 0 < r < R \\).</i>',
            options: ['Leída y anotada'],
            correct: 0,
            feedback: 'Vamos a desglosar este "monstruo" paso a paso usando variables complejas.'
        },
        {
            type: 'quiz',
            text: '<b>Paso 1: Elegir la función compleja.</b><br>Para integrar senos y cosenos en la recta real usando complejos, NO usamos \\( f(z) = \\frac{\\operatorname{sen}(z)}{z(z^2+\\alpha^2)} \\). En su lugar, usamos \\( f(z) = \\frac{e^{iz}}{z(z^2+\\alpha^2)} \\) y luego tomamos la parte imaginaria. ¿Por qué hacemos esto?',
            options: [
                'Porque \\( \\operatorname{sen}(z) \\) no es holomorfa en el plano complejo.',
                'Porque \\( e^{iz} \\) está acotada en el semiplano superior (\\( y > 0 \\)), mientras que \\( \\operatorname{sen}(z) \\) crece exponencialmente.',
                'Porque \\( e^{iz} \\) no tiene singularidades, simplificando el cálculo de los residuos.'
            ],
            correct: 1,
            feedback: '¡Exacto! Como \\( z = x + iy \\), entonces \\( e^{iz} = e^{ix}e^{-y} \\). Si \\( y > 0 \\), el término \\( e^{-y} \\) decae, lo que nos permite usar el Lema de Jordan para que la integral en el arco exterior gigante dé cero. \\( \\operatorname{sen}(z) \\) tiene términos \\( e^{y} \\) que explotan.'
        },
        {
            type: 'info',
            text: '<b>Paso 2: Visualizar el contorno.</b><br>La sugerencia te pide un medio anillo. . <br>Esto nos da 4 caminos:<br>1. Eje real de \\( -R \\) a \\( -r \\)<br>2. Semicírculo chiquito \\( C_r \\) esquivando el origen (sentido horario)<br>3. Eje real de \\( r \\) a \\( R \\)<br>4. Semicírculo gigante \\( C_R \\) (sentido antihorario).',
            options: ['Entendido, la suma da el total adentro'],
            correct: 0,
            feedback: 'Como \\( R \\to \\infty \\) y \\( r \\to 0 \\), los tramos 1 y 3 formarán nuestra integral impropia de \\( -\\infty \\) a \\( \\infty \\).'
        },
        {
            type: 'quiz',
            text: '<b>Paso 3: Singularidades y Residuos.</b><br>Nuestra función es \\( f(z) = \\frac{e^{iz}}{z(z-i\\alpha)(z+i\\alpha)} \\). Tenemos polos simples en \\( z=0 \\), \\( z=i\\alpha \\) y \\( z=-i\\alpha \\). ¿Cuál de ellos está **adentro** de nuestro contorno en el semiplano superior?',
            options: [
                'Solo \\( z = 0 \\)',
                'Solo \\( z = i\\alpha \\)',
                'Ambos \\( z = 0 \\) y \\( z = i\\alpha \\)'
            ],
            correct: 1,
            feedback: '¡Bien! El origen \\( z=0 \\) lo dejamos afuera a propósito esquivándolo con el arco \\( C_r \\). El polo \\( -i\\alpha \\) está en el semiplano inferior. Así que solo nos importa \\( i\\alpha \\).'
        },
        {
            type: 'quiz',
            text: '<b>Paso 4: Calcular el residuo.</b><br>Para un polo simple en \\( z_0 \\), el residuo es \\( \\lim_{z \\to z_0} (z-z_0)f(z) \\). Si calculamos el residuo en \\( z = i\\alpha \\) para nuestra función, ¿qué obtenemos?',
            options: [
                '\\( \\frac{e^{-\\alpha}}{2i\\alpha^2} \\)',
                '\\( \\frac{e^{-\\alpha}}{-2\\alpha^2} \\)',
                '\\( \\frac{e^{\\alpha}}{-2\\alpha^2} \\)'
            ],
            correct: 1,
            feedback: '¡Perfecto! Al multiplicar por \\( (z-i\\alpha) \\) y evaluar en \\( i\\alpha \\), queda \\( \\frac{e^{i(i\\alpha)}}{i\\alpha(i\\alpha + i\\alpha)} = \\frac{e^{-\\alpha}}{i\\alpha(2i\\alpha)} = \\frac{e^{-\\alpha}}{-2\\alpha^2} \\). Multiplicado por \\( 2\\pi i \\), la integral total del contorno es \\( -i\\pi \\frac{e^{-\\alpha}}{\\alpha^2} \\).'
        },
        {
            type: 'quiz',
            text: '<b>Paso 5: El arco pequeño \\( C_r \\).</b><br>Al esquivar el polo en \\( z=0 \\) por arriba en sentido horario, usamos el Teorema del Residuo Fraccionario. La contribución de la integral sobre \\( C_r \\) cuando \\( r \\to 0 \\) es \\( -i\\pi \\cdot \\operatorname{Res}(f, 0) \\). Como \\( \\operatorname{Res}(f,0) = \\frac{1}{\\alpha^2} \\), ese límite da \\( -\\frac{i\\pi}{\\alpha^2} \\). Sabiendo que el arco gigante da 0, juntamos todo:<br> \\( \\int_{-\\infty}^\\infty \\frac{e^{ix}}{x(x^2+\\alpha^2)} dx - \\frac{i\\pi}{\\alpha^2} = -i\\pi \\frac{e^{-\\alpha}}{\\alpha^2} \\). <br>Si despejamos la integral y tomamos la **parte imaginaria**, obtenemos la integral de \\( -\\infty \\) a \\( \\infty \\). ¿Qué falta para llegar a la respuesta final del parcial?',
            options: [
                'Sumarle la parte real.',
                'Dividir por 2, ya que la función integrando \\( \\frac{\\operatorname{sen}(x)}{x(x^2+\\alpha^2)} \\) es par, y nos piden de 0 a \\( \\infty \\).',
                'Multiplicar por \\( e^{i\\alpha} \\).'
            ],
            correct: 1,
            feedback: '¡Espectacular! Resolviste un ejercicio de final/parcial completo. Despejando, la integral en toda la recta da \\( i\\pi \\frac{1-e^{-\\alpha}}{\\alpha^2} \\). Su parte imaginaria es \\( \\pi \\frac{1-e^{-\\alpha}}{\\alpha^2} \\). Como te piden de 0 a \\( \\infty \\), dividís por 2: Respuesta final: \\( \\frac{\\pi}{2\\alpha^2}(1-e^{-\\alpha}) \\). ∎'
        }
    ];
    let currentLesson = 0;

    function renderLesson() {
        const lesson = lessons[currentLesson];
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const feedbackEl = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');

        // Actualizar UI
        questionEl.innerHTML = lesson.text;
        optionsEl.innerHTML = '';
        feedbackEl.innerHTML = '';
        nextBtn.style.display = 'none';

        // Barra de progreso
        const progress = (currentLesson / lessons.length) * 100;
        document.getElementById('progress').style.width = progress + '%';

        // Generar botones
        lesson.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsEl.appendChild(btn);
        });

        // Re-renderizar las matemáticas de LaTeX
        MathJax.typesetPromise();
    }

    function checkAnswer(selectedIndex, btnElement) {
        const lesson = lessons[currentLesson];
        const feedbackEl = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const allBtns = document.querySelectorAll('.option-btn');

        // Deshabilitar botones después de responder
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex === lesson.correct) {
            btnElement.classList.add('correct');
            feedbackEl.innerHTML = '✅ ' + lesson.feedback;
            feedbackEl.style.color = 'var(--primary-dark)';
            nextBtn.style.display = 'block';
        } else {
            btnElement.classList.add('incorrect');
            feedbackEl.innerHTML = '❌ Inténtalo de nuevo.';
            feedbackEl.style.color = '#ea2b2b';
            // Permitir volver a intentar después de un segundo
            setTimeout(() => {
                btnElement.classList.remove('incorrect');
                feedbackEl.innerHTML = '';
                allBtns.forEach(b => b.disabled = false);
            }, 1500);
        }
        MathJax.typesetPromise();
    }

    function nextLesson() {
        currentLesson++;
        if (currentLesson < lessons.length) {
            renderLesson();
        } else {
            document.getElementById('lesson-content').innerHTML = '<h2>¡Módulo completado! 🎉</h2><p>Ya dominas lo básico de Cauchy-Riemann.</p>';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('progress').style.width = '100%';
        }
    }

    // Iniciar app
    window.onload = renderLesson;
</script>

</body>
</html>
